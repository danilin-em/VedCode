name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - run: go vet ./...

      - uses: golangci/golangci-lint-action@v7

      - run: go test ./...

      - run: go build ./cmd/vedcode/
